<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze RPG: Level 1</title>
    <style>
        /* CSS STYLES */
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* Prevent scrolling on mobile */
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            border: 2px solid #333;
            width: 100%;
            max-width: 640px;
            aspect-ratio: 4 / 3;
        }

        canvas {
            display: block;
            background-color: #000;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        #ui-layer {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
            font-size: clamp(12px, 2vw, 16px);
        }

        #hud {
            font-size: clamp(12px, 2vw, 16px);
            margin-bottom: 5px;
        }

        #controls {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: clamp(10px, 1.5vw, 12px);
            color: #888;
            pointer-events: none;
            display: none; /* Hide keyboard controls on mobile */
        }

        /* Mobile Controls */
        #mobile-controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            pointer-events: none;
        }

        .control-group {
            pointer-events: auto;
            display: flex;
            gap: 10px;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            backdrop-filter: blur(5px);
        }

        .control-btn:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
        }

        .arrow-up {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Hide mobile controls on desktop */
        @media (min-width: 768px) {
            #mobile-controls {
                display: none;
            }
            #controls {
                display: block;
            }
        }

        #game-over-screen, #level-complete-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            display: none;
        }

        /* Back to Menu Button */
        #menu-btn {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            color: white;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            z-index: 20;
            pointer-events: auto;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        #menu-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-50%) scale(1.05);
        }

        /* Style Selector Button */
        #style-btn {
            position: absolute;
            top: 10px;
            right: 60px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            z-index: 20;
            pointer-events: auto;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        #style-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        /* Skin Selector Button */
        #skin-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            z-index: 20;
            pointer-events: auto;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        #skin-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        /* Style Selector Dropdown */
        #style-dropdown {
            position: absolute;
            top: 55px;
            right: 10px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 10px;
            z-index: 20;
            display: none;
            backdrop-filter: blur(10px);
            min-width: 150px;
        }

        #style-dropdown.show {
            display: block;
        }

        .style-option {
            padding: 10px 15px;
            margin: 5px 0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid transparent;
        }

        .style-option:hover {
            transform: translateX(3px);
        }

        .style-option.active {
            border-color: rgba(255, 255, 255, 0.5);
        }

        .style-option .preview {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Style Previews */
        .preview-bw { background: linear-gradient(135deg, #000 50%, #fff 50%); }
        .preview-galaxy { background: linear-gradient(135deg, #1a0033, #001133, #003322); }
        .preview-colorful { background: linear-gradient(135deg, #ff6b6b, #4ecdc4, #45b7d1); }

        /* Skin Gallery Modal */
        #skin-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        #skin-modal.show {
            display: flex;
        }

        #skin-modal-content {
            background: rgba(20, 20, 40, 0.95);
            border: 2px solid rgba(78, 205, 196, 0.5);
            border-radius: 15px;
            padding: 30px;
            max-width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 40px rgba(78, 205, 196, 0.3);
            display: flex;
            flex-direction: column;
        }

        #skin-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(78, 205, 196, 0.3);
            padding-bottom: 15px;
        }

        #skin-modal-header h2 {
            margin: 0;
            color: #4ecdc4;
            font-size: 24px;
        }

        #skin-modal-close {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 24px;
            width: 40px;
            height: 40px;
            padding: 0;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        #skin-modal-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        #skin-preview-area {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        #skin-preview-canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border: 2px solid rgba(78, 205, 196, 0.5);
            border-radius: 5px;
        }

        #skin-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
            justify-items: center;
        }

        .skin-item {
            width: 80px;
            height: 80px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .skin-item:hover {
            border-color: rgba(78, 205, 196, 0.6);
            transform: scale(1.05);
            background: rgba(78, 205, 196, 0.1);
        }

        .skin-item.selected {
            border-color: rgba(78, 205, 196, 0.9);
            box-shadow: 0 0 15px rgba(78, 205, 196, 0.5);
            background: rgba(78, 205, 196, 0.2);
        }

        .skin-canvas {
            width: 60px;
            height: 60px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        h1 { margin: 0 0 10px 0; color: #fff; }
        p { margin: 0 0 20px 0; color: #ccc; }
        
        button {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 10px 20px;
            font-family: inherit;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }
        button:hover { background: #555; }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Back to Menu Button -->
        <a href="index.html" id="menu-btn">← Menu</a>

        <div id="ui-layer">
            <div id="hud">Level: <span id="level-display">1</span> | Time: <span id="time-display">0</span>s</div>
        </div>
        
        <canvas id="gameCanvas" width="640" height="480"></canvas>

        <div id="controls">
            Controls: Arrow Keys or WASD to Move
        </div>

        <!-- Mobile Touch Controls -->
        <div id="mobile-controls">
            <div class="control-group">
                <div class="control-btn" id="btn-left">←</div>
                <div class="control-btn" id="btn-down">↓</div>
                <div class="control-btn" id="btn-up">↑</div>
                <div class="control-btn" id="btn-right">→</div>
            </div>
        </div>

        <div id="game-over-screen">
            <h1>GAME OVER</h1>
            <p>You hit a wall or fell into a pit.</p>
            <button onclick="game.resetGame()">Try Again</button>
        </div>

        <div id="level-complete-screen">
            <h1>LEVEL COMPLETE!</h1>
            <p>Time: <span id="final-time">0</span>s</p>
            <button onclick="game.nextLevel()">Next Level</button>
        </div>

        <!-- Style Selector Button -->
        <button id="style-btn" title="Change Style">🎨</button>

        <!-- Skin Selector Button -->
        <a href="skins.html" id="skin-btn" title="Select Skin" style="display: flex; align-items: center; justify-content: center;">👾</a>

        <!-- Style Selector Dropdown -->
        <div id="style-dropdown">
            <div class="style-option active" data-style="bw" onclick="game.setStyle('bw')">
                <span class="preview preview-bw"></span>
                <span>Black & White</span>
            </div>
            <div class="style-option" data-style="galaxy" onclick="game.setStyle('galaxy')">
                <span class="preview preview-galaxy"></span>
                <span>Galaxy</span>
            </div>
            <div class="style-option" data-style="colorful" onclick="game.setStyle('colorful')">
                <span class="preview preview-colorful"></span>
                <span>Colorful</span>
            </div>
        </div>

        <!-- Skin Gallery Modal -->
        <div id="skin-modal" style="display: none;">
            <div id="skin-modal-content">
                <div id="skin-modal-header">
                    <h2>Select Your Skin</h2>
                    <button id="skin-modal-close" onclick="game.closeSkinGallery()">✕</button>
                </div>
                <div id="skin-preview-area">
                    <canvas id="skin-preview-canvas" width="100" height="100"></canvas>
                </div>
                <div id="skin-gallery">
                    <!-- Skins will be generated here by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <script>
        /**
         * GAME DESIGN SUMMARY
         * 
         * This is a minimalist 2D top-down maze RPG.
         * The player is a white square navigating a black-and-white pixel maze.
         * The goal is to reach the green exit tile.
         * 
         * Core Systems:
         * 1. Grid-based movement (4 directions)
         * 2. Procedurally generated mazes using a simple algorithm
         * 3. Collision detection against walls (black pixels)
         * 4. Level progression (1 to 100)
         * 5. Timer and HUD
         */

        // Style Themes Configuration
        const STYLE_THEMES = {
            bw: {
                name: 'Black & White',
                background: '#000000',
                wall: '#000000',
                wallBorder: '#111111',
                path: '#111111',
                exit: '#00ff00',
                exitBorder: '#ffffff',
                player: '#ffffff',
                playerEyes: '#000000',
                hudShadow: '1px 1px 2px black'
            },
            galaxy: {
                name: 'Galaxy',
                background: '#0a0015',
                wall: '#1a0033',
                wallBorder: '#2a0050',
                path: '#0d0020',
                exit: '#ffd700',
                exitBorder: '#ffaa00',
                player: '#e0e0ff',
                playerEyes: '#4400aa',
                hudShadow: '0 0 10px rgba(150, 100, 255, 0.5)'
            },
            colorful: {
                name: 'Colorful',
                background: '#1a1a2e',
                wall: '#16213e',
                wallBorder: '#0f3460',
                path: '#1a1a2e',
                exit: '#e94560',
                exitBorder: '#ff6b6b',
                player: '#4ecdc4',
                playerEyes: '#1a1a2e',
                hudShadow: '0 0 10px rgba(78, 205, 196, 0.5)'
            }
        };

        // Skin definitions - 25 unique skins with different facial expressions
        const SKINS = [
            { id: 1, name: 'Classic', eyes: [[3, 3], [10, 3]], mouth: 'neutral' },
            { id: 2, name: 'Happy', eyes: [[3, 3], [10, 3]], mouth: 'smile' },
            { id: 3, name: 'Sad', eyes: [[3, 3], [10, 3]], mouth: 'frown' },
            { id: 4, name: 'Wink', eyes: [[3, 3]], mouth: 'wink' },
            { id: 5, name: 'Sunglasses', eyes: 'shades', mouth: 'cool' },
            { id: 6, name: 'Big Eyes', eyes: [[2, 2], [11, 2]], mouth: 'surprise' },
            { id: 7, name: 'Sleepy', eyes: 'closed', mouth: 'yawn' },
            { id: 8, name: 'Angry', eyes: [[3, 3], [10, 3]], mouth: 'angry' },
            { id: 9, name: 'Evil', eyes: [[2, 3], [9, 3]], mouth: 'evil' },
            { id: 10, name: 'Nerd', eyes: 'glasses', mouth: 'nerdy' },
            { id: 11, name: 'XD', eyes: [[3, 3], [10, 3]], mouth: 'xd' },
            { id: 12, name: 'Love', eyes: 'hearts', mouth: 'love' },
            { id: 13, name: 'Dizzy', eyes: [[4, 2], [9, 2]], mouth: 'dizzy' },
            { id: 14, name: 'Confused', eyes: [[3, 3], [10, 3]], mouth: 'confused' },
            { id: 15, name: 'Excited', eyes: [[3, 3], [10, 3]], mouth: 'excited' },
            { id: 16, name: 'Pirate', eyes: [[3, 3]], mouth: 'pirate' },
            { id: 17, name: 'Ghostly', eyes: 'ghost', mouth: 'boo' },
            { id: 18, name: 'No Mouth', eyes: [[3, 3], [10, 3]], mouth: 'none' },
            { id: 19, name: 'Expressionless', eyes: 'line', mouth: 'straight' },
            { id: 20, name: 'Party', eyes: [[2, 2], [11, 2]], mouth: 'party' },
            { id: 21, name: 'Grumpy', eyes: [[2, 4], [11, 4]], mouth: 'grumpy' },
            { id: 22, name: 'Shy', eyes: [[5, 3], [9, 3]], mouth: 'shy' },
            { id: 23, name: 'Mischief', eyes: [[3, 2], [10, 2]], mouth: 'mischief' },
            { id: 24, name: 'Sweat', eyes: [[3, 3], [10, 3]], mouth: 'sweat' },
            { id: 25, name: 'Grateful', eyes: [[3, 3], [10, 3]], mouth: 'grateful' }
        ];

        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                // Game State
                this.level = 1;
                this.score = 0;
                this.startTime = Date.now();
                this.isGameOver = false;
                this.isLevelComplete = false;

                // Grid Settings
                this.tileSize = 20;
                this.grid = [];
                this.player = { x: 1, y: 1 };
                this.exit = { x: 0, y: 0 };

                // Current Style Theme - Read from localStorage
                this.currentStyle = localStorage.getItem('mazeRPGStyle') || 'bw';
                this.currentSkin = parseInt(localStorage.getItem('mazeRPGSkin') || '1');

                // DOM Elements
                this.levelDisplay = document.getElementById('level-display');
                this.timeDisplay = document.getElementById('time-display');
                this.finalTimeDisplay = document.getElementById('final-time');
                this.gameOverScreen = document.getElementById('game-over-screen');
                this.levelCompleteScreen = document.getElementById('level-complete-screen');
                this.styleBtn = document.getElementById('style-btn');
                this.styleDropdown = document.getElementById('style-dropdown');
                this.skinBtn = document.getElementById('skin-btn');
                this.skinModal = document.getElementById('skin-modal');

                // Setup style selector
                this.setupStyleSelector();

                // Setup skin selector
                this.setupSkinSelector();

                // Apply saved style on load
                this.applyStyle(this.currentStyle);

                // Input Handling
                this.keys = {};
                window.addEventListener('keydown', (e) => this.keys[e.key] = true);
                window.addEventListener('keyup', (e) => this.keys[e.key] = false);

                // Mobile Touch Controls
                this.setupTouchControls();

                // Start Game
                this.init();
            }

            // --- SKIN SELECTOR ---
            setupSkinSelector() {
                // Open skin gallery on button click
                this.skinBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.openSkinGallery();
                });

                // Close modal when clicking outside
                this.skinModal.addEventListener('click', (e) => {
                    if (e.target === this.skinModal) {
                        this.closeSkinGallery();
                    }
                });

                // Generate skin gallery on first open
                this.generateSkinGallery();
            }

            generateSkinGallery() {
                const gallery = document.getElementById('skin-gallery');
                gallery.innerHTML = '';

                SKINS.forEach(skin => {
                    const skinItem = document.createElement('div');
                    skinItem.className = 'skin-item';
                    if (skin.id === this.currentSkin) {
                        skinItem.classList.add('selected');
                    }

                    const canvas = document.createElement('canvas');
                    canvas.className = 'skin-canvas';
                    canvas.width = 60;
                    canvas.height = 60;

                    this.drawSkin(canvas.getContext('2d'), skin, canvas.width, canvas.height);

                    skinItem.appendChild(canvas);
                    skinItem.addEventListener('click', () => this.selectSkin(skin));
                    gallery.appendChild(skinItem);
                });
            }

            openSkinGallery() {
                this.skinModal.classList.add('show');
                this.updateSkinPreview();
            }

            closeSkinGallery() {
                this.skinModal.classList.remove('show');
            }

            selectSkin(skin) {
                this.currentSkin = skin.id;
                localStorage.setItem('mazeRPGSkin', skin.id);

                // Update selected indicator
                document.querySelectorAll('.skin-item').forEach((item, idx) => {
                    item.classList.toggle('selected', SKINS[idx].id === skin.id);
                });

                // Update preview
                this.updateSkinPreview();
            }

            updateSkinPreview() {
                const previewCanvas = document.getElementById('skin-preview-canvas');
                const ctx = previewCanvas.getContext('2d');
                const currentSkinObj = SKINS.find(s => s.id === this.currentSkin);

                // Clear canvas
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, previewCanvas.width, previewCanvas.height);

                // Draw enlarged skin
                this.drawSkin(ctx, currentSkinObj, previewCanvas.width, previewCanvas.height);
            }

            drawSkin(ctx, skin, width, height) {
                const padding = 5;
                const bodySize = width - (padding * 2);

                // Draw body (white square with glow)
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(padding, padding, bodySize, bodySize);

                // Draw eyes
                if (skin.eyes === 'shades') {
                    // Sunglasses
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(padding + 5, padding + 10, 8, 6);
                    ctx.fillRect(width - padding - 13, padding + 10, 8, 6);
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 1;
                    ctx.lineTo(padding + 13, padding + 13);
                    ctx.lineTo(width - padding - 13, padding + 13);
                    ctx.stroke();
                } else if (skin.eyes === 'ghost') {
                    // Ghost eyes
                    ctx.fillStyle = '#000000';
                    ctx.beginPath();
                    ctx.arc(padding + 10, padding + 10, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(width - padding - 10, padding + 10, 3, 0, Math.PI * 2);
                    ctx.fill();
                } else if (skin.eyes === 'glasses') {
                    // Nerd glasses
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(padding + 4, padding + 8, 8, 8);
                    ctx.strokeRect(width - padding - 12, padding + 8, 8, 8);
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 1;
                    ctx.lineTo(padding + 12, padding + 12);
                    ctx.lineTo(width - padding - 12, padding + 12);
                    ctx.stroke();
                } else if (skin.eyes === 'hearts') {
                    // Heart eyes
                    ctx.fillStyle = '#ff0000';
                    ctx.font = 'bold 8px Arial';
                    ctx.fillText('♥', padding + 6, padding + 12);
                    ctx.fillText('♥', width - padding - 12, padding + 12);
                } else if (skin.eyes === 'closed') {
                    // Closed/sleepy eyes
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(padding + 10, padding + 10, 3, 0, Math.PI);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(width - padding - 10, padding + 10, 3, 0, Math.PI);
                    ctx.stroke();
                } else if (skin.eyes === 'line') {
                    // Line eyes
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(padding + 7, padding + 10);
                    ctx.lineTo(padding + 13, padding + 10);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(width - padding - 13, padding + 10);
                    ctx.lineTo(width - padding - 7, padding + 10);
                    ctx.stroke();
                } else if (Array.isArray(skin.eyes)) {
                    // Normal eyes
                    ctx.fillStyle = '#000000';
                    skin.eyes.forEach(([x, y]) => {
                        ctx.fillRect(padding + x, padding + y, 3, 3);
                    });
                }

                // Draw mouth
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1;
                ctx.fillStyle = '#000000';

                const mouthY = padding + 18;
                const mouthX = width / 2;

                switch (skin.mouth) {
                    case 'smile':
                        ctx.beginPath();
                        ctx.arc(mouthX, mouthY, 5, 0, Math.PI);
                        ctx.stroke();
                        break;
                    case 'frown':
                        ctx.beginPath();
                        ctx.arc(mouthX, mouthY + 3, 5, Math.PI, Math.PI * 2);
                        ctx.stroke();
                        break;
                    case 'wink':
                        ctx.fillRect(mouthX - 3, mouthY - 2, 6, 4);
                        break;
                    case 'cool':
                        ctx.beginPath();
                        ctx.arc(mouthX, mouthY, 4, 0, Math.PI);
                        ctx.stroke();
                        break;
                    case 'surprise':
                        ctx.beginPath();
                        ctx.arc(mouthX, mouthY, 2, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                    case 'yawn':
                        ctx.beginPath();
                        ctx.moveTo(mouthX - 3, mouthY - 2);
                        ctx.lineTo(mouthX, mouthY + 2);
                        ctx.lineTo(mouthX + 3, mouthY - 2);
                        ctx.stroke();
                        break;
                    case 'angry':
                        ctx.beginPath();
                        ctx.moveTo(mouthX - 4, mouthY + 2);
                        ctx.lineTo(mouthX + 4, mouthY - 2);
                        ctx.stroke();
                        break;
                    case 'evil':
                        ctx.beginPath();
                        ctx.moveTo(mouthX - 4, mouthY - 2);
                        ctx.quadraticCurveTo(mouthX, mouthY + 3, mouthX + 4, mouthY - 2);
                        ctx.stroke();
                        break;
                    case 'nerdy':
                        ctx.fillRect(mouthX - 2, mouthY, 4, 2);
                        break;
                    case 'xd':
                        ctx.beginPath();
                        ctx.arc(mouthX, mouthY + 1, 4, 0, Math.PI);
                        ctx.stroke();
                        ctx.font = 'bold 6px Arial';
                        ctx.fillText('D', mouthX + 3, mouthY - 1);
                        break;
                    case 'love':
                        ctx.font = 'bold 8px Arial';
                        ctx.fillText('♥', mouthX - 2, mouthY + 2);
                        break;
                    case 'dizzy':
                        ctx.beginPath();
                        ctx.arc(mouthX, mouthY, 1, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                    case 'confused':
                        ctx.beginPath();
                        ctx.moveTo(mouthX - 3, mouthY);
                        ctx.quadraticCurveTo(mouthX, mouthY - 2, mouthX + 3, mouthY);
                        ctx.stroke();
                        break;
                    case 'excited':
                        ctx.beginPath();
                        ctx.arc(mouthX, mouthY, 3, 0, Math.PI);
                        ctx.stroke();
                        ctx.fillRect(mouthX - 4, mouthY - 4, 2, 3);
                        ctx.fillRect(mouthX + 2, mouthY - 4, 2, 3);
                        break;
                    case 'pirate':
                        ctx.fillRect(mouthX - 2, mouthY, 4, 2);
                        ctx.fillRect(mouthX - 1, mouthY - 1, 2, 1);
                        break;
                    case 'boo':
                        ctx.fillRect(mouthX - 2, mouthY - 1, 4, 3);
                        break;
                    case 'party':
                        ctx.beginPath();
                        ctx.arc(mouthX, mouthY, 3, 0, Math.PI);
                        ctx.stroke();
                        ctx.fillRect(mouthX - 3, mouthY - 3, 2, 2);
                        ctx.fillRect(mouthX + 1, mouthY - 3, 2, 2);
                        break;
                    case 'grumpy':
                        ctx.beginPath();
                        ctx.moveTo(mouthX - 4, mouthY - 1);
                        ctx.lineTo(mouthX + 4, mouthY + 1);
                        ctx.stroke();
                        break;
                    case 'shy':
                        ctx.beginPath();
                        ctx.arc(mouthX, mouthY, 2, 0, Math.PI);
                        ctx.stroke();
                        break;
                    case 'mischief':
                        ctx.beginPath();
                        ctx.moveTo(mouthX - 3, mouthY);
                        ctx.quadraticCurveTo(mouthX, mouthY + 2, mouthX + 3, mouthY);
                        ctx.stroke();
                        ctx.fillRect(mouthX - 1, mouthY - 2, 2, 1);
                        break;
                    case 'sweat':
                        ctx.beginPath();
                        ctx.arc(mouthX, mouthY, 2, 0, Math.PI);
                        ctx.stroke();
                        ctx.fillRect(width - padding - 6, padding + 5, 2, 3);
                        break;
                    case 'grateful':
                        ctx.beginPath();
                        ctx.arc(mouthX, mouthY, 3, 0, Math.PI);
                        ctx.stroke();
                        ctx.fillRect(mouthX - 2, mouthY - 3, 1, 2);
                        ctx.fillRect(mouthX + 1, mouthY - 3, 1, 2);
                        break;
                    case 'straight':
                    case 'neutral':
                        ctx.fillRect(mouthX - 3, mouthY, 6, 1);
                        break;
                    case 'none':
                        // No mouth
                        break;
                }
            }

            // --- STYLE SELECTOR ---
            setupStyleSelector() {
                // Toggle dropdown on button click
                this.styleBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.styleDropdown.classList.toggle('show');
                });

                // Close dropdown when clicking outside
                document.addEventListener('click', (e) => {
                    if (!this.styleDropdown.contains(e.target) && e.target !== this.styleBtn) {
                        this.styleDropdown.classList.remove('show');
                    }
                });
            }

            applyStyle(styleName) {
                // Update HUD text shadow
                const hud = document.getElementById('hud');
                if (hud && STYLE_THEMES[styleName]) {
                    hud.style.textShadow = STYLE_THEMES[styleName].hudShadow;
                }

                // Update active state in dropdown
                document.querySelectorAll('.style-option').forEach(option => {
                    option.classList.toggle('active', option.dataset.style === styleName);
                });
            }

            setStyle(styleName) {
                if (!STYLE_THEMES[styleName]) return;
                
                this.currentStyle = styleName;
                
                // Save to localStorage
                localStorage.setItem('mazeRPGStyle', styleName);

                // Apply the style
                this.applyStyle(styleName);

                // Close dropdown
                this.styleDropdown.classList.remove('show');

                // Redraw immediately
                this.draw();
            }

            init() {
                this.level = 1;
                this.resetLevel();
                this.gameLoop();
            }

            resetGame() {
                this.level = 1;
                this.resetLevel();
                this.gameOverScreen.style.display = 'none';
                this.isGameOver = false;
            }

            resetLevel() {
                this.isLevelComplete = false;
                this.levelCompleteScreen.style.display = 'none';
                this.startTime = Date.now();
                this.generateMaze();
                this.updateHUD();
            }

            nextLevel() {
                this.level++;
                if (this.level > 100) {
                    alert("Congratulations! You've completed all 100 levels!");
                    this.level = 1;
                }
                this.resetLevel();
            }

            // --- MAZE GENERATION ---
            // Simple Recursive Backtracker Algorithm
            generateMaze() {
                const width = Math.floor(this.canvas.width / this.tileSize);
                const height = Math.floor(this.canvas.height / this.tileSize);

                // Initialize grid (0 = wall, 1 = path)
                this.grid = Array.from({ length: height }, () => Array(width).fill(0));

                // Start carving from (1,1)
                this.carve(1, 1);

                // Place Player and Exit
                this.player.x = 1;
                this.player.y = 1;

                // Find a random path tile for the exit (not too close to start)
                let exitFound = false;
                while (!exitFound) {
                    const ex = Math.floor(Math.random() * (width - 2)) + 1;
                    const ey = Math.floor(Math.random() * (height - 2)) + 1;
                    if (this.grid[ey][ex] === 1 && (ex > width/2 || ey > height/2)) {
                        this.exit.x = ex;
                        this.exit.y = ey;
                        exitFound = true;
                    }
                }
            }

            carve(x, y) {
                const dirs = [[0, -2], [2, 0], [0, 2], [-2, 0]];
                // Shuffle directions
                for (let i = dirs.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [dirs[i], dirs[j]] = [dirs[j], dirs[i]];
                }

                this.grid[y][x] = 1; // Mark as path

                for (let [dx, dy] of dirs) {
                    const nx = x + dx;
                    const ny = y + dy;
                    const mx = x + dx/2;
                    const my = y + dy/2;

                    if (nx > 0 && nx < this.grid[0].length - 1 && 
                        ny > 0 && ny < this.grid.length - 1 && 
                        this.grid[ny][nx] === 0) {
                        
                        this.grid[my][mx] = 1; // Carve passage
                        this.carve(nx, ny);
                    }
                }
            }

            // --- GAME LOGIC ---
            update() {
                if (this.isGameOver || this.isLevelComplete) return;

                const speed = 1;
                let dx = 0, dy = 0;

                // Input
                if (this.keys['ArrowUp'] || this.keys['w'] || this.keys['W']) dy = -speed;
                if (this.keys['ArrowDown'] || this.keys['s'] || this.keys['S']) dy = speed;
                if (this.keys['ArrowLeft'] || this.keys['a'] || this.keys['A']) dx = -speed;
                if (this.keys['ArrowRight'] || this.keys['d'] || this.keys['D']) dx = speed;

                if (dx !== 0 || dy !== 0) {
                    this.movePlayer(dx, dy);
                }

                this.updateHUD();
            }

            movePlayer(dx, dy) {
                const newX = this.player.x + dx;
                const newY = this.player.y + dy;

                // Boundary Check
                if (newX < 0 || newX >= this.grid[0].length || 
                    newY < 0 || newY >= this.grid.length) {
                    return;
                }

                // Wall Collision Check (Grid-based)
                // We check the tile the player is trying to move into
                const targetTile = this.grid[Math.floor(newY)][Math.floor(newX)];
                
                // If it's a wall (0), don't move
                if (targetTile === 0) {
                    return;
                }

                // Move
                this.player.x = newX;
                this.player.y = newY;

                // Check Win Condition
                if (Math.floor(this.player.x) === this.exit.x && 
                    Math.floor(this.player.y) === this.exit.y) {
                    this.completeLevel();
                }
            }

            completeLevel() {
                this.isLevelComplete = true;
                this.levelCompleteScreen.style.display = 'flex';
                const time = Math.floor((Date.now() - this.startTime) / 1000);
                this.finalTimeDisplay.innerText = time;
            }

            updateHUD() {
                this.levelDisplay.innerText = this.level;
                const time = Math.floor((Date.now() - this.startTime) / 1000);
                this.timeDisplay.innerText = time;
            }

            // --- RENDERING ---
            draw() {
                const theme = STYLE_THEMES[this.currentStyle];

                // Clear Screen with background color
                this.ctx.fillStyle = theme.background;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // Draw Grid
                for (let y = 0; y < this.grid.length; y++) {
                    for (let x = 0; x < this.grid[y].length; x++) {
                        if (this.grid[y][x] === 0) {
                            // Wall
                            this.ctx.fillStyle = theme.wall;
                            this.ctx.fillRect(x * this.tileSize, y * this.tileSize, this.tileSize, this.tileSize);
                            // Add pixel border for style
                            this.ctx.strokeStyle = theme.wallBorder;
                            this.ctx.strokeRect(x * this.tileSize, y * this.tileSize, this.tileSize, this.tileSize);
                        } else {
                            // Path
                            this.ctx.fillStyle = theme.path;
                            this.ctx.fillRect(x * this.tileSize, y * this.tileSize, this.tileSize, this.tileSize);
                        }
                    }
                }

                // Draw Exit with glow effect
                this.ctx.shadowColor = theme.exit;
                this.ctx.shadowBlur = 10;
                this.ctx.fillStyle = theme.exit;
                this.ctx.fillRect(this.exit.x * this.tileSize, this.exit.y * this.tileSize, this.tileSize, this.tileSize);
                this.ctx.shadowBlur = 0;
                this.ctx.strokeStyle = theme.exitBorder;
                this.ctx.strokeRect(this.exit.x * this.tileSize, this.exit.y * this.tileSize, this.tileSize, this.tileSize);

                // Draw Player with glow effect
                this.ctx.shadowColor = theme.player;
                this.ctx.shadowBlur = 8;
                this.ctx.fillStyle = theme.player;
                this.ctx.fillRect(this.player.x * this.tileSize, this.player.y * this.tileSize, this.tileSize, this.tileSize);
                this.ctx.shadowBlur = 0;
                
                // Draw player with selected skin
                const currentSkinObj = SKINS.find(s => s.id === this.currentSkin);
                this.drawSkin(this.ctx, currentSkinObj, this.player.x * this.tileSize, this.player.y * this.tileSize, this.tileSize);
            }

            // --- MOBILE TOUCH CONTROLS ---
            setupTouchControls() {
                const btnUp = document.getElementById('btn-up');
                const btnDown = document.getElementById('btn-down');
                const btnLeft = document.getElementById('btn-left');
                const btnRight = document.getElementById('btn-right');

                // Helper to add touch events to a button
                const addTouchEvents = (btn, key) => {
                    btn.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        this.keys[key] = true;
                    });
                    btn.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        this.keys[key] = false;
                    });
                    btn.addEventListener('touchcancel', (e) => {
                        e.preventDefault();
                        this.keys[key] = false;
                    });
                    // Also support mouse for testing on desktop
                    btn.addEventListener('mousedown', (e) => {
                        this.keys[key] = true;
                    });
                    btn.addEventListener('mouseup', (e) => {
                        this.keys[key] = false;
                    });
                    btn.addEventListener('mouseleave', (e) => {
                        this.keys[key] = false;
                    });
                };

                addTouchEvents(btnUp, 'ArrowUp');
                addTouchEvents(btnDown, 'ArrowDown');
                addTouchEvents(btnLeft, 'ArrowLeft');
                addTouchEvents(btnRight, 'ArrowRight');
            }

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        }

        // Start the game when the page loads
        const game = new Game();

    </script>
