<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze RPG - Skin Selector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(78, 205, 196, 0.3);
        }

        h1 {
            font-size: 36px;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(78, 205, 196, 0.5);
        }

        .back-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            color: white;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .preview-section {
            display: flex;
            justify-content: center;
            margin-bottom: 50px;
            padding: 40px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(78, 205, 196, 0.3);
            border-radius: 15px;
        }

        #skin-preview-canvas {
            width: 200px;
            height: 200px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border: 3px solid rgba(78, 205, 196, 0.5);
            border-radius: 10px;
            background: #000000;
        }

        .preview-info {
            margin-left: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .preview-info h2 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #4ecdc4;
        }

        .preview-info p {
            font-size: 16px;
            color: #cccccc;
            margin-bottom: 20px;
        }

        .apply-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #4ecdc4, #45b7d1);
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            width: fit-content;
        }

        .apply-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.5);
        }

        .skins-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .skin-item {
            aspect-ratio: 1;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            flex-direction: column;
            padding: 10px;
        }

        .skin-item:hover {
            border-color: rgba(78, 205, 196, 0.6);
            transform: scale(1.08);
            background: rgba(78, 205, 196, 0.1);
        }

        .skin-item.selected {
            border-color: rgba(78, 205, 196, 0.9);
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.6);
            background: rgba(78, 205, 196, 0.2);
        }

        .skin-canvas {
            width: 80px;
            height: 80px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            margin-bottom: 5px;
        }

        .skin-name {
            font-size: 12px;
            color: #cccccc;
            text-align: center;
        }

        @media (max-width: 768px) {
            .preview-section {
                flex-direction: column;
            }

            .preview-info {
                margin-left: 0;
                margin-top: 20px;
            }

            .skins-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 15px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>👾 Select Your Skin</h1>
            <a href="index.html" class="back-btn">← Back to Menu</a>
        </header>

        <div class="preview-section">
            <canvas id="skin-preview-canvas" width="200" height="200"></canvas>
            <div class="preview-info">
                <h2 id="skin-name">Classic</h2>
                <p>Click on any skin below to preview it</p>
                <button class="apply-btn" onclick="applySkin()">✓ Apply Skin</button>
            </div>
        </div>

        <div class="skins-grid" id="skins-grid">
            <!-- Skins will be generated here by JavaScript -->
        </div>
    </div>

    <script>
        // Skin definitions - 25 unique skins with different facial expressions
        const SKINS = [
            { id: 1, name: 'Classic', eyes: [[3, 3], [10, 3]], mouth: 'neutral' },
            { id: 2, name: 'Happy', eyes: [[3, 3], [10, 3]], mouth: 'smile' },
            { id: 3, name: 'Sad', eyes: [[3, 3], [10, 3]], mouth: 'frown' },
            { id: 4, name: 'Wink', eyes: [[3, 3]], mouth: 'wink' },
            { id: 5, name: 'Sunglasses', eyes: 'shades', mouth: 'cool' },
            { id: 6, name: 'Big Eyes', eyes: [[2, 2], [11, 2]], mouth: 'surprise' },
            { id: 7, name: 'Sleepy', eyes: 'closed', mouth: 'yawn' },
            { id: 8, name: 'Angry', eyes: [[3, 3], [10, 3]], mouth: 'angry' },
            { id: 9, name: 'Evil', eyes: [[2, 3], [9, 3]], mouth: 'evil' },
            { id: 10, name: 'Nerd', eyes: 'glasses', mouth: 'nerdy' },
            { id: 11, name: 'XD', eyes: [[3, 3], [10, 3]], mouth: 'xd' },
            { id: 12, name: 'Love', eyes: 'hearts', mouth: 'love' },
            { id: 13, name: 'Dizzy', eyes: [[4, 2], [9, 2]], mouth: 'dizzy' },
            { id: 14, name: 'Confused', eyes: [[3, 3], [10, 3]], mouth: 'confused' },
            { id: 15, name: 'Excited', eyes: [[3, 3], [10, 3]], mouth: 'excited' },
            { id: 16, name: 'Pirate', eyes: [[3, 3]], mouth: 'pirate' },
            { id: 17, name: 'Ghostly', eyes: 'ghost', mouth: 'boo' },
            { id: 18, name: 'No Mouth', eyes: [[3, 3], [10, 3]], mouth: 'none' },
            { id: 19, name: 'Expressionless', eyes: 'line', mouth: 'straight' },
            { id: 20, name: 'Party', eyes: [[2, 2], [11, 2]], mouth: 'party' },
            { id: 21, name: 'Grumpy', eyes: [[2, 4], [11, 4]], mouth: 'grumpy' },
            { id: 22, name: 'Shy', eyes: [[5, 3], [9, 3]], mouth: 'shy' },
            { id: 23, name: 'Mischief', eyes: [[3, 2], [10, 2]], mouth: 'mischief' },
            { id: 24, name: 'Sweat', eyes: [[3, 3], [10, 3]], mouth: 'sweat' },
            { id: 25, name: 'Grateful', eyes: [[3, 3], [10, 3]], mouth: 'grateful' }
        ];

        let currentSkin = parseInt(localStorage.getItem('mazeRPGSkin') || '1');

        function drawSkin(ctx, skin, width, height) {
            const padding = 5;
            const bodySize = width - (padding * 2);

            // Draw body (white square with glow)
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(padding, padding, bodySize, bodySize);

            // Draw eyes
            if (skin.eyes === 'shades') {
                ctx.fillStyle = '#000000';
                ctx.fillRect(padding + 5, padding + 10, 8, 6);
                ctx.fillRect(width - padding - 13, padding + 10, 8, 6);
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1;
                ctx.lineTo(padding + 13, padding + 13);
                ctx.lineTo(width - padding - 13, padding + 13);
                ctx.stroke();
            } else if (skin.eyes === 'ghost') {
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(padding + 10, padding + 10, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(width - padding - 10, padding + 10, 3, 0, Math.PI * 2);
                ctx.fill();
            } else if (skin.eyes === 'glasses') {
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 2;
                ctx.strokeRect(padding + 4, padding + 8, 8, 8);
                ctx.strokeRect(width - padding - 12, padding + 8, 8, 8);
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1;
                ctx.lineTo(padding + 12, padding + 12);
                ctx.lineTo(width - padding - 12, padding + 12);
                ctx.stroke();
            } else if (skin.eyes === 'hearts') {
                ctx.fillStyle = '#ff0000';
                ctx.font = 'bold 8px Arial';
                ctx.fillText('♥', padding + 6, padding + 12);
                ctx.fillText('♥', width - padding - 12, padding + 12);
            } else if (skin.eyes === 'closed') {
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(padding + 10, padding + 10, 3, 0, Math.PI);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(width - padding - 10, padding + 10, 3, 0, Math.PI);
                ctx.stroke();
            } else if (skin.eyes === 'line') {
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(padding + 7, padding + 10);
                ctx.lineTo(padding + 13, padding + 10);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(width - padding - 13, padding + 10);
                ctx.lineTo(width - padding - 7, padding + 10);
                ctx.stroke();
            } else if (Array.isArray(skin.eyes)) {
                ctx.fillStyle = '#000000';
                skin.eyes.forEach(([x, y]) => {
                    ctx.fillRect(padding + x, padding + y, 3, 3);
                });
            }

            // Draw mouth
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 1;
            ctx.fillStyle = '#000000';

            const mouthY = padding + 18;
            const mouthX = width / 2;

            switch (skin.mouth) {
                case 'smile':
                    ctx.beginPath();
                    ctx.arc(mouthX, mouthY, 5, 0, Math.PI);
                    ctx.stroke();
                    break;
                case 'frown':
                    ctx.beginPath();
                    ctx.arc(mouthX, mouthY + 3, 5, Math.PI, Math.PI * 2);
                    ctx.stroke();
                    break;
                case 'wink':
                    ctx.fillRect(mouthX - 3, mouthY - 2, 6, 4);
                    break;
                case 'cool':
                    ctx.beginPath();
                    ctx.arc(mouthX, mouthY, 4, 0, Math.PI);
                    ctx.stroke();
                    break;
                case 'surprise':
                    ctx.beginPath();
                    ctx.arc(mouthX, mouthY, 2, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                case 'yawn':
                    ctx.beginPath();
                    ctx.moveTo(mouthX - 3, mouthY - 2);
                    ctx.lineTo(mouthX, mouthY + 2);
                    ctx.lineTo(mouthX + 3, mouthY - 2);
                    ctx.stroke();
                    break;
                case 'angry':
                    ctx.beginPath();
                    ctx.moveTo(mouthX - 4, mouthY + 2);
                    ctx.lineTo(mouthX + 4, mouthY - 2);
                    ctx.stroke();
                    break;
                case 'evil':
                    ctx.beginPath();
                    ctx.moveTo(mouthX - 4, mouthY - 2);
                    ctx.quadraticCurveTo(mouthX, mouthY + 3, mouthX + 4, mouthY - 2);
                    ctx.stroke();
                    break;
                case 'nerdy':
                    ctx.fillRect(mouthX - 2, mouthY, 4, 2);
                    break;
                case 'xd':
                    ctx.beginPath();
                    ctx.arc(mouthX, mouthY + 1, 4, 0, Math.PI);
                    ctx.stroke();
                    ctx.font = 'bold 6px Arial';
                    ctx.fillText('D', mouthX + 3, mouthY - 1);
                    break;
                case 'love':
                    ctx.font = 'bold 8px Arial';
                    ctx.fillText('♥', mouthX - 2, mouthY + 2);
                    break;
                case 'dizzy':
                    ctx.beginPath();
                    ctx.arc(mouthX, mouthY, 1, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                case 'confused':
                    ctx.beginPath();
                    ctx.moveTo(mouthX - 3, mouthY);
                    ctx.quadraticCurveTo(mouthX, mouthY - 2, mouthX + 3, mouthY);
                    ctx.stroke();
                    break;
                case 'excited':
                    ctx.beginPath();
                    ctx.arc(mouthX, mouthY, 3, 0, Math.PI);
                    ctx.stroke();
                    ctx.fillRect(mouthX - 4, mouthY - 4, 2, 3);
                    ctx.fillRect(mouthX + 2, mouthY - 4, 2, 3);
                    break;
                case 'pirate':
                    ctx.fillRect(mouthX - 2, mouthY, 4, 2);
                    ctx.fillRect(mouthX - 1, mouthY - 1, 2, 1);
                    break;
                case 'boo':
                    ctx.fillRect(mouthX - 2, mouthY - 1, 4, 3);
                    break;
                case 'party':
                    ctx.beginPath();
                    ctx.arc(mouthX, mouthY, 3, 0, Math.PI);
                    ctx.stroke();
                    ctx.fillRect(mouthX - 3, mouthY - 3, 2, 2);
                    ctx.fillRect(mouthX + 1, mouthY - 3, 2, 2);
                    break;
                case 'grumpy':
                    ctx.beginPath();
                    ctx.moveTo(mouthX - 4, mouthY - 1);
                    ctx.lineTo(mouthX + 4, mouthY + 1);
                    ctx.stroke();
                    break;
                case 'shy':
                    ctx.beginPath();
                    ctx.arc(mouthX, mouthY, 2, 0, Math.PI);
                    ctx.stroke();
                    break;
                case 'mischief':
                    ctx.beginPath();
                    ctx.moveTo(mouthX - 3, mouthY);
                    ctx.quadraticCurveTo(mouthX, mouthY + 2, mouthX + 3, mouthY);
                    ctx.stroke();
                    ctx.fillRect(mouthX - 1, mouthY - 2, 2, 1);
                    break;
                case 'sweat':
                    ctx.beginPath();
                    ctx.arc(mouthX, mouthY, 2, 0, Math.PI);
                    ctx.stroke();
                    ctx.fillRect(width - padding - 6, padding + 5, 2, 3);
                    break;
                case 'grateful':
                    ctx.beginPath();
                    ctx.arc(mouthX, mouthY, 3, 0, Math.PI);
                    ctx.stroke();
                    ctx.fillRect(mouthX - 2, mouthY - 3, 1, 2);
                    ctx.fillRect(mouthX + 1, mouthY - 3, 1, 2);
                    break;
                case 'straight':
                case 'neutral':
                    ctx.fillRect(mouthX - 3, mouthY, 6, 1);
                    break;
                case 'none':
                    break;
            }
        }

        function updatePreview() {
            const previewCanvas = document.getElementById('skin-preview-canvas');
            const ctx = previewCanvas.getContext('2d');
            const currentSkinObj = SKINS.find(s => s.id === currentSkin);

            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, previewCanvas.width, previewCanvas.height);

            drawSkin(ctx, currentSkinObj, previewCanvas.width, previewCanvas.height);
            document.getElementById('skin-name').textContent = currentSkinObj.name;
        }

        function initializeSkins() {
            const grid = document.getElementById('skins-grid');
            grid.innerHTML = '';

            SKINS.forEach(skin => {
                const skinItem = document.createElement('div');
                skinItem.className = 'skin-item' + (skin.id === currentSkin ? ' selected' : '');
                skinItem.onclick = () => selectSkin(skin);

                const canvas = document.createElement('canvas');
                canvas.className = 'skin-canvas';
                canvas.width = 80;
                canvas.height = 80;

                drawSkin(canvas.getContext('2d'), skin, canvas.width, canvas.height);

                const name = document.createElement('div');
                name.className = 'skin-name';
                name.textContent = skin.name;

                skinItem.appendChild(canvas);
                skinItem.appendChild(name);
                grid.appendChild(skinItem);
            });

            updatePreview();
        }

        function selectSkin(skin) {
            currentSkin = skin.id;

            // Update selected state
            document.querySelectorAll('.skin-item').forEach((item, idx) => {
                item.classList.toggle('selected', SKINS[idx].id === skin.id);
            });

            updatePreview();
        }

        function applySkin() {
            localStorage.setItem('mazeRPGSkin', currentSkin);
            alert('Skin applied! Go back to the game to see your new look.');
        }

        // Initialize on page load
        initializeSkins();
    </script>
</body>
</html>
